spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:price_alerts}
    username: ${POSTGRES_USER:alerts}
    password: ${POSTGRES_PASSWORD:alerts}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    # See alert-rule-service's application.yml for why this needs its own history table name and
    # baseline settings: both services share the price_alerts database, and Flyway's history
    # table is scoped per schema, not per service, so without these each service's "V1__..."
    # migration collides with (or is blocked by) the other's.
    table: flyway_schema_history_notification_service
    baseline-on-migrate: true
    baseline-version: 0
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: tom.burrows.commons.events
        spring.json.value.default.type: tom.burrows.commons.events.AlertTriggeredEvent
        spring.json.use.type.headers: false

management:
  endpoints:
    web:
      exposure:
        include: health
