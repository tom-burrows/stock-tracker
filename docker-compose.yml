services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_KRAFT_MODE: "true"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:19092,CONTROLLER://kafka:19093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:19093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: alerts
      POSTGRES_PASSWORD: alerts
      POSTGRES_DB: price_alerts
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alerts"]
      interval: 5s
      timeout: 5s
      retries: 5

  price-ingestion-service:
    build:
      context: .
      dockerfile: price-ingestion-service/Dockerfile
    container_name: price-ingestion-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

  alert-rule-service:
    build:
      context: .
      dockerfile: alert-rule-service/Dockerfile
    container_name: alert-rule-service
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/price_alerts
      SPRING_DATASOURCE_USERNAME: alerts
      SPRING_DATASOURCE_PASSWORD: alerts
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # No REST API and no host port: only alert-rule-service's schema and price-ingestion-service's
  # topic are consumed here.
  alert-evaluation-service:
    build:
      context: .
      dockerfile: alert-evaluation-service/Dockerfile
    container_name: alert-evaluation-service
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:19092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/price_alerts
      SPRING_DATASOURCE_USERNAME: alerts
      SPRING_DATASOURCE_PASSWORD: alerts
    depends_on:
      kafka:
        condition: service_healthy
      alert-rule-service:
        condition: service_healthy

  # Optional but genuinely useful while developing — a UI to see topics/messages
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:
  postgres-data: